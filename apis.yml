aid: zabbix
name: Zabbix
description: >-
  Zabbix is an enterprise-class open source distributed monitoring solution for networks and applications. Zabbix
  enables real-time monitoring of millions of metrics collected from tens of thousands of servers, virtual machines, and
  network devices. The Zabbix API provides JSON-RPC 2.0 access for programmatically managing host configurations,
  collecting monitoring data, and automating operations.
image: https://www.zabbix.com/assets/img/logo/zabbix_logo.png
url: https://raw.githubusercontent.com/api-evangelist/zabbix/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-05-19'
specificationVersion: '0.19'
tags:
