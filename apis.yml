  - Infrastructure
  - Networks
  - Alerting
  - Open Source
  - Observability
apis:
  - aid: zabbix:zabbix-api
    name: Zabbix API
    description: >-
      The Zabbix API is a JSON-RPC 2.0 HTTP API for programmatically retrieving and modifying the configuration of
      Zabbix and accessing historical monitoring data. Supports host management, item configuration, trigger management,
      event handling, alerting, user management, and historical data retrieval.
    image: https://www.zabbix.com/assets/img/logo/zabbix_logo.png
    humanURL: https://www.zabbix.com/documentation/current/en/manual/api
    baseURL: https://{host}/zabbix/api_jsonrpc.php
    tags:
      - Monitoring
      - Infrastructure
      - JSON-RPC
      - Alerting
      - Networks
