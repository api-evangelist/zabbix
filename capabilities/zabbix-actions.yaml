naftiko: 1.0.0-alpha2
info:
  label: Zabbix API — Actions
  description: 'Zabbix API — Actions. 2 operations. Lead operation: Create Action. Self-contained Naftiko capability covering
    one Zabbix business surface.'
  tags:
  - Zabbix
  - Actions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZABBIX_API_KEY: ZABBIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: zabbix-actions
    baseUri: https://{host}/zabbix/api_jsonrpc.php
    description: Zabbix API — Actions business capability. Self-contained, no shared references.
    resources:
    - name: action.create
      path: /action.create
      operations:
      - name: actioncreate
        method: POST
        description: Create Action
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: action.get
      path: /action.get
      operations:
      - name: actionget
        method: POST
        description: Get Actions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZABBIX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: zabbix-actions-rest
    port: 8080
    description: REST adapter for Zabbix API — Actions. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/action-create
      name: action-create
      description: REST surface for action.create.
      operations:
      - method: POST
        name: actioncreate
        description: Create Action
        call: zabbix-actions.actioncreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/action-get
      name: action-get
      description: REST surface for action.get.
      operations:
      - method: POST
        name: actionget
        description: Get Actions
        call: zabbix-actions.actionget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zabbix-actions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zabbix API — Actions. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-action
      description: Create Action
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zabbix-actions.actioncreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-actions
      description: Get Actions
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: zabbix-actions.actionget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
