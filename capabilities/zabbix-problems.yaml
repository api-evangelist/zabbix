naftiko: 1.0.0-alpha2
info:
  label: Zabbix API — Problems
  description: 'Zabbix API — Problems. 1 operations. Lead operation: Get Problems. Self-contained Naftiko capability covering
    one Zabbix business surface.'
  tags:
  - Zabbix
  - Problems
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZABBIX_API_KEY: ZABBIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: zabbix-problems
    baseUri: https://{host}/zabbix/api_jsonrpc.php
    description: Zabbix API — Problems business capability. Self-contained, no shared references.
    resources:
    - name: problem.get
      path: /problem.get
      operations:
      - name: problemget
        method: POST
        description: Get Problems
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZABBIX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: zabbix-problems-rest
    port: 8080
    description: REST adapter for Zabbix API — Problems. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/problem-get
      name: problem-get
      description: REST surface for problem.get.
      operations:
      - method: POST
        name: problemget
        description: Get Problems
        call: zabbix-problems.problemget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zabbix-problems-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zabbix API — Problems. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-problems
      description: Get Problems
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: zabbix-problems.problemget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
