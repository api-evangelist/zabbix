naftiko: 1.0.0-alpha2
info:
  label: Zabbix API — Triggers
  description: 'Zabbix API — Triggers. 2 operations. Lead operation: Create Trigger. Self-contained Naftiko capability covering
    one Zabbix business surface.'
  tags:
  - Zabbix
  - Triggers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZABBIX_API_KEY: ZABBIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: zabbix-triggers
    baseUri: https://{host}/zabbix/api_jsonrpc.php
    description: Zabbix API — Triggers business capability. Self-contained, no shared references.
    resources:
    - name: trigger.create
      path: /trigger.create
      operations:
      - name: triggercreate
        method: POST
        description: Create Trigger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: trigger.get
      path: /trigger.get
      operations:
      - name: triggerget
        method: POST
        description: Get Triggers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZABBIX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: zabbix-triggers-rest
    port: 8080
    description: REST adapter for Zabbix API — Triggers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/trigger-create
      name: trigger-create
      description: REST surface for trigger.create.
      operations:
      - method: POST
        name: triggercreate
        description: Create Trigger
        call: zabbix-triggers.triggercreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/trigger-get
      name: trigger-get
      description: REST surface for trigger.get.
      operations:
      - method: POST
        name: triggerget
        description: Get Triggers
        call: zabbix-triggers.triggerget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zabbix-triggers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zabbix API — Triggers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-trigger
      description: Create Trigger
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zabbix-triggers.triggercreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-triggers
      description: Get Triggers
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: zabbix-triggers.triggerget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
