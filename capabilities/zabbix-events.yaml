naftiko: 1.0.0-alpha2
info:
  label: Zabbix API — Events
  description: 'Zabbix API — Events. 2 operations. Lead operation: Acknowledge Event. Self-contained Naftiko capability covering
    one Zabbix business surface.'
  tags:
  - Zabbix
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZABBIX_API_KEY: ZABBIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: zabbix-events
    baseUri: https://{host}/zabbix/api_jsonrpc.php
    description: Zabbix API — Events business capability. Self-contained, no shared references.
    resources:
    - name: event.acknowledge
      path: /event.acknowledge
      operations:
      - name: eventacknowledge
        method: POST
        description: Acknowledge Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: event.get
      path: /event.get
      operations:
      - name: eventget
        method: POST
        description: Get Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ZABBIX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: zabbix-events-rest
    port: 8080
    description: REST adapter for Zabbix API — Events. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/event-acknowledge
      name: event-acknowledge
      description: REST surface for event.acknowledge.
      operations:
      - method: POST
        name: eventacknowledge
        description: Acknowledge Event
        call: zabbix-events.eventacknowledge
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/event-get
      name: event-get
      description: REST surface for event.get.
      operations:
      - method: POST
        name: eventget
        description: Get Events
        call: zabbix-events.eventget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zabbix-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zabbix API — Events. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: acknowledge-event
      description: Acknowledge Event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zabbix-events.eventacknowledge
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-events
      description: Get Events
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: zabbix-events.eventget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
