    resources:
    - name: host.create
      path: /host.create
      operations:
      - name: hostcreate
        method: POST
        description: Create Host
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: host.delete
      path: /host.delete
      operations:
      - name: hostdelete
